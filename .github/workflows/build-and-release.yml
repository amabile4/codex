name: build-and-release

on:
  push:
    tags:
      - 'rust-v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-linux:
    name: Linux build (release)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             build-essential             pkg-config             libcap-dev             libseccomp-dev             clang

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build (release)
        working-directory: codex-rs
        run: cargo build --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-linux
          path: codex-rs/target/release/codex

  build-windows:
    name: Windows build (release, low-memory)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build (release, LTO disabled, single binary)
        working-directory: codex-rs
        env:
          CARGO_PROFILE_RELEASE_LTO: "false"
        run: cargo build --release --bin codex --jobs 1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-windows
          path: codex-rs/target/release/codex.exe

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: codex-linux
          path: dist/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: codex-windows
          path: dist/windows

      - name: List release files
        run: ls -R dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/linux/codex
            dist/windows/codex.exe